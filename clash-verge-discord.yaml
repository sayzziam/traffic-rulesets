proxies:
  - name: "My-Shadowsocks"
    type: ss
    server: <ip>
    port: <port>
    cipher: chacha20-ietf-poly1305
    password: <password>
    udp: true
  - name: "My-VLESS
    type: ss
    server: <ip>
    port: <port>
    cipher: chacha20-ietf-poly1305
    password: <password>
    udp: true

proxy-groups:
  - name: "Shadowsocks"
    type: select
    proxies:
      - "My-Shadowsocks"
      - DIRECT
  - name: "VLESS"
    type: select
    proxies:
      - "My-VLESS"
      - DIRECT


#--------------------------------------------------------------------------------------------------------------------
# NOTE: in my case VLESS is used to UDP, Shadowsocks to TCP, if ur proxy can both TCP&UDP - use everywhere your Proxy  
#--------------------------------------------------------------------------------------------------------------------
rules:
  # Exceptions
  - DOMAIN-SUFFIX,vk.com,DIRECT
  - DOMAIN-KEYWORD,vkontakte,DIRECT

  # 1) QUIC through VLESS
  - AND,((NETWORK,UDP),(DST-PORT,443)),VLESS

  # 2) WebRTC(VoIP + Streaming)
  - DST-PORT,3478-3497,VLESS     # STUN/TURN
  - DST-PORT,50000-65535,VLESS   # RTP (Discord voice)
  - DST-PORT,16384-32767,VLESS
  - DOMAIN-SUFFIX,whatsapp.net,VLESS
  - DOMAIN-SUFFIX,telegram.org,VLESS
  - DOMAIN-SUFFIX,t.me,VLESS

  # 3) OpenAI / ChatGPT
  - DOMAIN-SUFFIX,openai.com,Shadowsocks
  - DOMAIN-SUFFIX,chatgpt.com,Shadowsocks
  - DOMAIN,api.openai.com,Shadowsocks
  - DOMAIN,cdn.openai.com,Shadowsocks

  # 4) Discord
  - DOMAIN-SUFFIX,discord-attachments-uploads-prd.storage.googleapis.com,Shadowsocks
  - DOMAIN-SUFFIX,discord.app,Shadowsocks
  - DOMAIN-SUFFIX,discord.co,Shadowsocks
  - DOMAIN-SUFFIX,discord.com,Shadowsocks
  - DOMAIN-SUFFIX,discord.design,Shadowsocks
  - DOMAIN-SUFFIX,discord.dev,Shadowsocks
  - DOMAIN-SUFFIX,discord.gift,Shadowsocks
  - DOMAIN-SUFFIX,discord.gifts,Shadowsocks
  - DOMAIN-SUFFIX,discord.gg,Shadowsocks
  - DOMAIN-SUFFIX,discord.media,Shadowsocks
  - DOMAIN-SUFFIX,discord.new,Shadowsocks
  - DOMAIN-SUFFIX,discord.store,Shadowsocks
  - DOMAIN-SUFFIX,discord.status,Shadowsocks
  - DOMAIN-SUFFIX,discord-activities.com,Shadowsocks
  - DOMAIN-SUFFIX,discordactivities.com,Shadowsocks
  - DOMAIN-SUFFIX,discordapp.com,Shadowsocks
  - DOMAIN-SUFFIX,discordapp.net,Shadowsocks
  - DOMAIN-SUFFIX,discordcdn.com,Shadowsocks
  - DOMAIN-SUFFIX,discordmerch.com,Shadowsocks
  - DOMAIN-SUFFIX,discordpartygames.com,Shadowsocks
  - DOMAIN-SUFFIX,discordsays.com,Shadowsocks
  - DOMAIN-SUFFIX,discordsez.com,Shadowsocks

  # 5) Youtube (videos, static, preview)
  - DOMAIN-SUFFIX,youtube.com,Shadowsocks
  - DOMAIN-SUFFIX,youtu.be,Shadowsocks
  - DOMAIN-SUFFIX,googlevideo.com,Shadowsocks
  - DOMAIN-SUFFIX,ytimg.com,Shadowsocks
  - DOMAIN-SUFFIX,ggpht.com,Shadowsocks
  - DOMAIN-KEYWORD,googleapis,Shadowsocks
  - DOMAIN-KEYWORD,youtube,Shadowsocks
  - DOMAIN-KEYWORD,googleads,Shadowsocks
  - DOMAIN,sponsor.ajay.app,Shadowsocks

  # 6) Cloudflare range
  - IP-CIDR,162.159.128.0/19,Shadowsocks
  - IP-CIDR,162.159.192.0/18,Shadowsocks

  # Non-rule traffic - DIRECT
  - MATCH,DIRECT
